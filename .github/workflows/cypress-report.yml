name: Cypress Test Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        id: cypress
        env:
          CYPRESS_USERNAME: ${{ secrets.CYPRESS_USERNAME || 'admin' }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD || 'password' }}
        run: |
          mkdir -p reports
          set +e
          npm run test:smoke > reports/test-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat reports/test-output.txt
          exit 0

      - name: Generate README test report
        if: always()
        run: |
          mkdir -p reports
          cat > reports/README.md <<EOF
          # Cypress Test Report

          - Workflow: ${{ github.workflow }}
          - Run ID: ${{ github.run_id }}
          - Commit: ${{ github.sha }}
          - Triggered by: ${{ github.actor }}
          - Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - Test command: npm run test:smoke
          - Exit code: ${{ steps.cypress.outputs.status || 'unknown' }}
          - Result: ${{ steps.cypress.outputs.status == '0' && 'Passed' || 'Failed' }}

          ## Test output

          ```text
          $(cat reports/test-output.txt)
          ```
          EOF

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-test-report
          path: reports/README.md

      - name: Commit generated report
        if: github.ref == 'refs/heads/main' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/README.md
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update Cypress test report"
            git push
          fi
